services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: agent_haderach
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "127.0.0.1:55432:5432"
    volumes:
      - haderach-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d agent_haderach"]
      interval: 2s
      timeout: 3s
      retries: 20

volumes:
  haderach-postgres:
